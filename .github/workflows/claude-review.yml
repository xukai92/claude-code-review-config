name: Claude Code Review (Reusable)

on:
  workflow_call:
    inputs:
      no-nit:
        description: 'Suppress nit-level feedback (style, naming, theoretical edge cases)'
        type: boolean
        default: true
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Check for WIP commit
        id: check-wip
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Last commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == \[wip\]* ]] || [[ "$COMMIT_MSG" == \[WIP\]* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping review: commit marked as work in progress"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Code Review
        if: steps.check-wip.outputs.skip != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            Before running the review, read ALL existing review comment threads on this PR using:
              gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments --paginate
              gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews --paginate

            Build a dismissed-issues list: for each comment thread where the PR author replied dismissing, explaining, or acknowledging the concern (e.g. "intentional", "not relevant", "will address later", "by design"), or where the thread was resolved, record the file, line range, and issue summary. These issues are CLOSED and must NOT be re-raised.

            When reviewing, do NOT re-raise any dismissed issue, even if you independently consider it a real problem. Match by semantic similarity — e.g. "TLS verification disabled" and "SSL cert check bypassed" are the same issue. The only exception: new code in a DIFFERENT file/function introducing a new instance of a dismissed pattern.

            Now run the review:
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
            ${{ inputs.no-nit == true && 'No-nit mode: Only flag substantive issues — bugs, security vulnerabilities, correctness errors, significant design concerns. Skip style preferences, naming nits, theoretical edge cases unlikely in practice, minor refactoring suggestions. If in doubt, do not comment.' || '' }}
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
